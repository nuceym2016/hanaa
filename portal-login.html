<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Auditor Gateway | Dhaxal Engine</title>
    <link rel="stylesheet" href="inheritance-core.css">
    <style>
        .split-viewport { min-height: calc(100vh - 80px); display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #115e59 0%, #042f2e 100%); padding: 20px; }
        .modal-box { background: #ffffff; width: 100%; max-width: 420px; padding: 40px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <nav class="sys-navbar">
        <a href="index.html" class="sys-logo">⚖️ DHAXAL<span>ENGINE</span></a>
        <ul class="sys-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="calculator.html">Run Calculator</a></li>
        </ul>
    </nav>

    <div class="split-viewport">
        <div class="modal-box">
            <h2 style="font-family:'Space Grotesk'; text-align:center; color:var(--text-dark); margin-bottom:6px;">Auditor Access</h2>
            <p style="text-align:center; font-size:0.85rem; color:var(--text-slate); margin-bottom:25px;">Sign in to execute complex judicial records updates.</p>
            
            <form action="admin-dashboard.html" method="GET">
                <div class="input-row"><label>Auditor Network Key ID</label><input type="text" placeholder="Badge/License Number" required></div>
                <div class="input-row"><label>Security Verification Password</label><input type="password" placeholder="••••••••" required></div>
                <button type="submit" class="btn-action" style="width:100%; padding:13px; font-size:1rem; margin-top:10px;">Verify Security Signature</button>
            </form>
            
            <div style="text-align:center; margin-top:20px; font-size:0.85rem;">
                <a href="portal-reset.html" style="color:var(--text-slate); text-decoration:none;">Reset Credentials?</a>
            </div>
        </div>
    </div>

</body>
</html>
